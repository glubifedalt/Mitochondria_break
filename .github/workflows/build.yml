name: Build C++ MinGW

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    env:
      MINGW_PATH: C:\msys64\mingw64\bin
    steps:
      - name: Checkout
        uses: actions/checkout@v5
      - name: Add MinGW to PATH
        shell: pwsh
        run: Add-Content $env:GITHUB_PATH "C:\msys64\mingw64\bin"
      - name: Compile
        shell: pwsh
        run: >
          & "C:\msys64\mingw64\bin\g++.exe"
          -std=c++17 -O2 -static -static-libgcc -static-libstdc++ -o Synergy.exe main.cpp
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: Synergy-windows-portable
          path: Synergy.exe
          retention-days: 30
