name: Build C++ MinGW

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    defaults:
      run:
        shell: msys2 {0}
    steps:
      - name: Checkout
        uses: actions/checkout@v5
      - name: Setup MSYS2 and MinGW
        uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          update: false
          install: mingw-w64-x86_64-gcc
      - name: Compile
        run: g++ -std=c++17 -O2 -static -static-libgcc -static-libstdc++ -o app.exe main.cpp
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-windows-portable
          path: app.exe
          retention-days: 30
