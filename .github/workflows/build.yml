name: Build C++ MinGW

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Add MinGW to PATH
        shell: pwsh
        run: echo "C:\msys64\mingw64\bin" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append
      - name: Compile
        shell: cmd
        run: "g++ -static -static-libgcc -static-libstdc++ -std=c++17 -O2 -o synergy.exe main.cpp"
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: synergy-windows-portable
          path: synergy.exe
          retention-days: 30
